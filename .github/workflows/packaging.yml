name: Kernel Packaging

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  arch-package-sanity:
    name: makepkg --nobuild
    runs-on: ubuntu-latest
    container:
      image: archlinux:base-devel
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Prepare build user
        run: |
          pacman -Syu --noconfirm --needed gnupg sudo
          useradd builder -m
          echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers
          chown -R builder:builder .

      - name: Validate PKGBUILD source and prepare phase
        run: |
          sudo -H -E -u builder bash -lc '
            gpg --batch --keyserver hkps://keyserver.ubuntu.com --recv-keys \
              E18447AC260021D31F3FF6C4C8A2A4774B8B63C4 \
              E8B9AA39F054E30E8290D492C3C4820857F654FE
            cd packaging/arch
            makepkg --cleanbuild --nobuild --syncdeps --noconfirm --needed
          '
